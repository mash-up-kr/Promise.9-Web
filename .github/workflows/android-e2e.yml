name: Android E2E (Maestro)

# 네이티브 Android E2E. 웹(Playwright)은 web-e2e.yml, iOS 는 비용/시간 이슈로 제외.
# 방식: release APK(JS 번들 임베드)를 빌드해 Metro 없이 maestro 로 검증.
#   → 디버그+Metro 방식의 dev-client 연결 취약점을 제거해 CI 안정성 확보.
on:
  pull_request:
    paths-ignore: [ "**/*.md", "docs/**", "e2e/**", "playwright.config.ts" ]
  push:
    branches: [main]
    paths-ignore: [ "**/*.md", "docs/**", "e2e/**", "playwright.config.ts" ]

# 같은 ref 의 이전 실행은 취소(러너 점유 절약)
concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maestro-android:
    runs-on: ubuntu-latest # 표준 러너 → public 레포 무료
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # package.json 의 packageManager(pnpm@11.7.0) 사용
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Gradle·Maestro 둘 다 Java 17 필요 (setup-java 가 JAVA_HOME 설정)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - run: pnpm install --frozen-lockfile

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # 네이티브 모듈(reanimated/worklets) C++ 빌드용 NDK 등 라이선스 사전 동의
      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      # android/ 는 gitignore 라 CI 에서 생성
      - name: Prebuild (generate android/)
        run: pnpm expo prebuild --platform android

      # release APK = JS 번들이 APK 에 임베드됨 → 런타임에 Metro 불필요.
      # Expo 템플릿은 release 를 debug 키로 서명하므로 에뮬레이터 설치 가능.
      # Hermes/R8 가 메모리를 많이 써 기본 heap(2g)에선 daemon OOM 이 나므로 상향 + --no-daemon.
      - name: Build release APK (embedded JS bundle)
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g
        run: ./gradlew :app:assembleRelease --no-daemon

      # 에뮬레이터 하드웨어 가속(KVM) 활성화
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            set -e
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            maestro test .maestro

      # 실패 시 Maestro 스크린샷/로그 보존
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: maestro-android-artifacts
          path: ~/.maestro/tests/
          if-no-files-found: ignore
          retention-days: 7
